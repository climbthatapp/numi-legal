<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numi Legal</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 48px 20px;
      background: #f6f8fa;
      color: #1f2328;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 28px;
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin: 10px 0;
    }
    a {
      color: #0969da;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Numi Legal</h1>
    <p>Public legal pages for the Numi iOS application.</p>
    <ul>
      <li><a href="/numi-legal/privacy/">Privacy Policy</a></li>
      <li><a href="/numi-legal/terms/">Terms of Use</a></li>
    </ul>
  </main>

</html>
